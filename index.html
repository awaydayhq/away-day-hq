<!DOCTYPE html>
<html>
<head>
  <title>Away Day HQ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #061a33;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }
    .box {
      max-width: 700px;
    }
    h1 {
      font-size: 54px;
      margin-bottom: 10px;
    }
    .gold {
      color: #f5b400;
    }
    h2 {
      font-size: 28px;
      margin-bottom: 25px;
    }
    p {
      font-size: 20px;
      line-height: 1.5;
    }
    .button {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 28px;
      background: #f5b400;
      color: #061a33;
      font-weight: bold;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>AWAY DAY <span class="gold">HQ</span></h1>
    <h2>Plan Together. Travel Together. Support Together.</h2>
    <p>The home of sporting away days.</p>
    <p>Plan trips, discover away guides, travel with fans, and make every away day easier.</p>
    <a class="button" href="mailto:hello@awaydayhq.com">Launching Soon</a>
  </div>

</html>
